<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Генерал-майор диванних військ текстового забезпечення">
  <!-- Зовнішнє чорне кільце (той самий шаблон, що й BMW) -->
  <circle cx="100" cy="100" r="98" fill="#0a0a0a"/>
  <circle cx="100" cy="100" r="96" fill="none" stroke="#e9e9e9" stroke-width="1.2"/>
  <circle cx="100" cy="100" r="67" fill="none" stroke="#e9e9e9" stroke-width="1.2"/>

  <!-- Внутрішнє поле: армійський оливковий (диванні війська) -->
  <clipPath id="floodInner"><circle cx="100" cy="100" r="65"/></clipPath>
  <g clip-path="url(#floodInner)">
    <rect x="35" y="35" width="130" height="130" fill="#4b5320"/>
    <!-- легке затемнення низу для глибини -->
    <rect x="35" y="120" width="130" height="45" fill="#3a4317" opacity="0.55"/>
  </g>

  <!-- Зірка генерал-майора (одна велика — золото) -->
  <path d="M 100,42 L 106.47,59.10 L 124.73,59.97 L 110.46,71.40 L 115.28,89.03 L 100,79 L 84.72,89.03 L 89.54,71.40 L 75.27,59.97 L 93.53,59.10 Z"
        fill="#ffd24a" stroke="#b8860b" stroke-width="1.3" stroke-linejoin="round"/>

  <!-- Диван — символ диванних військ -->
  <g stroke="#6e4f28" stroke-width="2" stroke-linejoin="round" fill="#d9b98a">
    <!-- спинка -->
    <rect x="56" y="101" width="88" height="22" rx="9"/>
    <!-- підлокітники -->
    <rect x="51" y="113" width="15" height="27" rx="7"/>
    <rect x="134" y="113" width="15" height="27" rx="7"/>
    <!-- сидіння -->
    <rect x="56" y="121" width="88" height="18" rx="6"/>
    <!-- ніжки -->
    <rect x="60" y="139" width="5" height="8" rx="1.5" fill="#6e4f28" stroke="none"/>
    <rect x="135" y="139" width="5" height="8" rx="1.5" fill="#6e4f28" stroke="none"/>
  </g>
  <!-- розділювачі подушок -->
  <line x1="100" y1="104" x2="100" y2="120" stroke="#6e4f28" stroke-width="1.4"/>
  <line x1="100" y1="123" x2="100" y2="137" stroke="#6e4f28" stroke-width="1.4"/>

  <!-- Бульбашка флуду «...» над диваном (текстове забезпечення) -->
  <g>
    <rect x="119" y="92" width="26" height="15" rx="7" fill="#f5f5f5"/>
    <path d="M 124,107 L 124,113 L 131,107 Z" fill="#f5f5f5"/>
    <circle cx="127" cy="99.5" r="1.6" fill="#4b5320"/>
    <circle cx="132" cy="99.5" r="1.6" fill="#4b5320"/>
    <circle cx="137" cy="99.5" r="1.6" fill="#4b5320"/>
  </g>

  <!-- Девіз підрозділу у верхній частині кільця -->
  <text x="100" y="28" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="18" letter-spacing="2" fill="#f0f0f0">ФЛУД</text>
</svg>
