<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="BMW">
  <!-- Зовнішнє чорне кільце -->
  <circle cx="100" cy="100" r="98" fill="#0a0a0a"/>
  <circle cx="100" cy="100" r="96" fill="none" stroke="#e9e9e9" stroke-width="1.2"/>
  <circle cx="100" cy="100" r="67" fill="none" stroke="#e9e9e9" stroke-width="1.2"/>

  <!-- Внутрішнє коло, поділене на 4 чверті (TL/BR — білі, TR/BL — сині) -->
  <clipPath id="bmwInner"><circle cx="100" cy="100" r="65"/></clipPath>
  <g clip-path="url(#bmwInner)">
    <rect x="35"  y="35"  width="65" height="65" fill="#ffffff"/>
    <rect x="100" y="35"  width="65" height="65" fill="#0066b1"/>
    <rect x="35"  y="100" width="65" height="65" fill="#0066b1"/>
    <rect x="100" y="100" width="65" height="65" fill="#ffffff"/>
  </g>

  <!-- Тонкі розділові лінії чвертей -->
  <line x1="100" y1="35"  x2="100" y2="165" stroke="#0a0a0a" stroke-width="1"/>
  <line x1="35"  y1="100" x2="165" y2="100" stroke="#0a0a0a" stroke-width="1"/>

  <!-- Напис BMW у верхній частині кільця -->
  <text x="100" y="27" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="21" letter-spacing="1.5" fill="#ffffff">BMW</text>
</svg>
