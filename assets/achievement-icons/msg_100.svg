<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Досягнення: Flood Rookie (рівень: бронза)">
  <defs>
    <radialGradient id="metal" cx="42%" cy="34%" r="72%">
      <stop offset="0%" stop-color="#f0c9a0"/><stop offset="40%" stop-color="#cd8a4e"/>
      <stop offset="76%" stop-color="#a8652f"/><stop offset="100%" stop-color="#6e3f1c"/>
    </radialGradient>
    <radialGradient id="field" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#b06a34"/><stop offset="100%" stop-color="#7a4a22"/>
    </radialGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0b07a"/><stop offset="100%" stop-color="#8a5a28"/>
    </linearGradient>
    <path id="lf" d="M0,0 C 6,-3 8,-11 0,-17 C -8,-11 -6,-3 0,0 Z"/>
  </defs>
  <!-- ВЕЛИКА монета: заповнює кадр, як емблема BMW -->
  <circle cx="100" cy="100" r="95" fill="url(#metal)"/>
  <circle cx="100" cy="100" r="95" fill="none" stroke="#4f2c12" stroke-width="5"/>
  <circle cx="100" cy="100" r="86" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="2"/>
  <circle cx="100" cy="100" r="80" fill="url(#field)" stroke="#4f2c12" stroke-width="2"/>
  <!-- лавровий вінок ВСЕРЕДИНІ монети (обрамляє центральний символ) -->
  <g transform="translate(100 93) scale(1.15) translate(-100 -100)">
    <g id="wreath-l" fill="url(#leaf)" stroke="#5e3a18" stroke-width="0.8">
      <path d="M58,168 Q 31,118 52,62" fill="none" stroke="#5e3a18" stroke-width="2.8"/>
      <use href="#lf" transform="translate(55,158) rotate(-48) scale(0.8)"/>
      <use href="#lf" transform="translate(49,147) rotate(-40) scale(0.95)"/>
      <use href="#lf" transform="translate(44,135) rotate(-32)"/>
      <use href="#lf" transform="translate(41,123) rotate(-22)"/>
      <use href="#lf" transform="translate(39,111) rotate(-13)"/>
      <use href="#lf" transform="translate(40,99) rotate(-4)"/>
      <use href="#lf" transform="translate(43,87) rotate(6)"/>
      <use href="#lf" transform="translate(47,76) rotate(16)"/>
      <use href="#lf" transform="translate(53,65) rotate(26) scale(0.82)"/>
      <circle cx="50" cy="141" r="2.4"/><circle cx="46" cy="117" r="2.4"/>
      <circle cx="47" cy="93" r="2.4"/><circle cx="52" cy="73" r="2.2"/>
    </g>
    <use href="#wreath-l" transform="matrix(-1 0 0 1 200 0)"/>
  </g>
  <!-- центральний символ — крупно, щоб чітко читалося -->
  <g transform="translate(100 100) scale(1.22) translate(-100 -100)">
    <path d="M82,72 H118 Q133,72 133,88 V102 Q133,118 118,118 H98 L83,132 L88,118 H82 Q67,118 67,102 V88 Q67,72 82,72 Z" fill="#ffe7cf" stroke="#4f2c12" stroke-width="4" stroke-linejoin="round"/>
    <circle cx="83" cy="95" r="5.5" fill="#4f2c12"/><circle cx="100" cy="95" r="5.5" fill="#4f2c12"/><circle cx="117" cy="95" r="5.5" fill="#4f2c12"/>
  </g>
</svg>