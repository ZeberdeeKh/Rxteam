<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Досягнення: Dawn Patrol (рівень: бронза)">
  <defs>
    <radialGradient id="metal" cx="42%" cy="34%" r="72%">
      <stop offset="0%" stop-color="#f0c9a0"/><stop offset="40%" stop-color="#cd8a4e"/>
      <stop offset="76%" stop-color="#a8652f"/><stop offset="100%" stop-color="#6e3f1c"/>
    </radialGradient>
    <radialGradient id="field" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#b06a34"/><stop offset="100%" stop-color="#7a4a22"/>
    </radialGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0b07a"/><stop offset="100%" stop-color="#8a5a28"/>
    </linearGradient>
    <path id="lf" d="M0,0 C 6,-3 8,-11 0,-17 C -8,-11 -6,-3 0,0 Z"/>
  </defs>
  <!-- ВЕЛИКА монета: заповнює кадр, як емблема BMW -->
  <circle cx="100" cy="100" r="95" fill="url(#metal)"/>
  <circle cx="100" cy="100" r="95" fill="none" stroke="#4f2c12" stroke-width="5"/>
  <circle cx="100" cy="100" r="86" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="2"/>
  <circle cx="100" cy="100" r="80" fill="url(#field)" stroke="#4f2c12" stroke-width="2"/>
  <!-- лавровий вінок ВСЕРЕДИНІ монети (обрамляє центральний символ) -->
  <g transform="translate(100 94) scale(1.12) translate(-100 -100)">
    <g id="wreath-l" fill="url(#leaf)" stroke="#5e3a18" stroke-width="1">
      <path d="M58,166 Q 33,120 50,68" fill="none" stroke="#5e3a18" stroke-width="2.6"/>
      <use href="#lf" transform="translate(54,150) rotate(-40) scale(0.95)"/>
      <use href="#lf" transform="translate(46,134) rotate(-28)"/>
      <use href="#lf" transform="translate(42,116) rotate(-16)"/>
      <use href="#lf" transform="translate(42,98) rotate(-6)"/>
      <use href="#lf" transform="translate(46,80) rotate(6)"/>
      <use href="#lf" transform="translate(53,66) rotate(20) scale(0.85)"/>
    </g>
    <use href="#wreath-l" transform="matrix(-1 0 0 1 200 0)"/>
  </g>
  <!-- центральний символ — крупно, щоб чітко читалося -->
  <g transform="translate(100 98) scale(1.18) translate(-100 -100)">
    <g stroke="#4f2c12" stroke-width="2.4" stroke-linecap="round" fill="none">
      <line x1="62" y1="114" x2="138" y2="114"/><line x1="100" y1="72" x2="100" y2="82"/>
      <line x1="74" y1="82" x2="80" y2="90"/><line x1="126" y1="82" x2="120" y2="90"/>
      <line x1="64" y1="100" x2="74" y2="102"/><line x1="136" y1="100" x2="126" y2="102"/>
    </g>
    <path d="M82,114 A18,18 0 0 1 118,114 Z" fill="#ffe7cf" stroke="#4f2c12" stroke-width="2.2" stroke-linejoin="round"/>
  </g>
</svg>