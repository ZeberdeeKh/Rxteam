<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Досягнення: Spam Master (рівень: золото)">
  <defs>
    <radialGradient id="metal" cx="42%" cy="34%" r="72%">
      <stop offset="0%" stop-color="#fff7d6"/><stop offset="40%" stop-color="#f4d35e"/>
      <stop offset="76%" stop-color="#d4af37"/><stop offset="100%" stop-color="#9a7d1f"/>
    </radialGradient>
    <radialGradient id="field" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#e9c64e"/><stop offset="100%" stop-color="#b8932b"/>
    </radialGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e7d27a"/><stop offset="100%" stop-color="#b08d2a"/>
    </linearGradient>
    <path id="lf" d="M0,0 C 6,-3 8,-11 0,-17 C -8,-11 -6,-3 0,0 Z"/>
  </defs>
  <!-- ВЕЛИКА монета: заповнює кадр, як емблема BMW -->
  <circle cx="100" cy="100" r="95" fill="url(#metal)"/>
  <circle cx="100" cy="100" r="95" fill="none" stroke="#6e5a14" stroke-width="5"/>
  <circle cx="100" cy="100" r="86" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="2"/>
  <circle cx="100" cy="100" r="80" fill="url(#field)" stroke="#6e5a14" stroke-width="2"/>
  <!-- лавровий вінок ВСЕРЕДИНІ монети (обрамляє центральний символ) -->
  <g transform="translate(100 93) scale(1.15) translate(-100 -100)">
    <g id="wreath-l" fill="url(#leaf)" stroke="#7a611d" stroke-width="1">
      <path d="M58,166 Q 33,120 50,68" fill="none" stroke="#7a611d" stroke-width="2.6"/>
      <use href="#lf" transform="translate(54,150) rotate(-40) scale(0.95)"/>
      <use href="#lf" transform="translate(46,134) rotate(-28)"/>
      <use href="#lf" transform="translate(42,116) rotate(-16)"/>
      <use href="#lf" transform="translate(42,98) rotate(-6)"/>
      <use href="#lf" transform="translate(46,80) rotate(6)"/>
      <use href="#lf" transform="translate(53,66) rotate(20) scale(0.85)"/>
    </g>
    <use href="#wreath-l" transform="matrix(-1 0 0 1 200 0)"/>
  </g>
  <!-- центральний символ — крупно, щоб чітко читалося -->
  <g transform="translate(100 100) scale(1.22) translate(-100 -100)">
    <path d="M82,72 H118 Q133,72 133,88 V102 Q133,118 118,118 H98 L83,132 L88,118 H82 Q67,118 67,102 V88 Q67,72 82,72 Z" fill="#fff4cf" stroke="#6e5a14" stroke-width="4" stroke-linejoin="round"/>
    <circle cx="83" cy="95" r="5.5" fill="#6e5a14"/><circle cx="100" cy="95" r="5.5" fill="#6e5a14"/><circle cx="117" cy="95" r="5.5" fill="#6e5a14"/>
  </g>
</svg>