<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Досягнення: Recruiter (рівень: срібло)">
  <defs>
    <radialGradient id="metal" cx="42%" cy="34%" r="72%">
      <stop offset="0%" stop-color="#ffffff"/><stop offset="40%" stop-color="#e8edf2"/>
      <stop offset="76%" stop-color="#c2cbd4"/><stop offset="100%" stop-color="#8b97a3"/>
    </radialGradient>
    <radialGradient id="field" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#cdd5dd"/><stop offset="100%" stop-color="#9aa6b2"/>
    </radialGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dfe6ec"/><stop offset="100%" stop-color="#9aa6b2"/>
    </linearGradient>
    <path id="lf" d="M0,0 C 6,-3 8,-11 0,-17 C -8,-11 -6,-3 0,0 Z"/>
  </defs>
  <!-- ВЕЛИКА монета: заповнює кадр, як емблема BMW -->
  <circle cx="100" cy="100" r="95" fill="url(#metal)"/>
  <circle cx="100" cy="100" r="95" fill="none" stroke="#5b6670" stroke-width="5"/>
  <circle cx="100" cy="100" r="86" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="2"/>
  <circle cx="100" cy="100" r="80" fill="url(#field)" stroke="#5b6670" stroke-width="2"/>
  <!-- лавровий вінок ВСЕРЕДИНІ монети (обрамляє центральний символ) -->
  <g transform="translate(0 -6)">
    <g id="wreath-l" fill="url(#leaf)" stroke="#5b6670" stroke-width="1">
      <path d="M58,166 Q 33,120 50,68" fill="none" stroke="#5b6670" stroke-width="2.6"/>
      <use href="#lf" transform="translate(54,150) rotate(-40) scale(0.95)"/>
      <use href="#lf" transform="translate(46,134) rotate(-28)"/>
      <use href="#lf" transform="translate(42,116) rotate(-16)"/>
      <use href="#lf" transform="translate(42,98) rotate(-6)"/>
      <use href="#lf" transform="translate(46,80) rotate(6)"/>
      <use href="#lf" transform="translate(53,66) rotate(20) scale(0.85)"/>
    </g>
    <use href="#wreath-l" transform="matrix(-1 0 0 1 200 0)"/>
  </g>
  <!-- центральний символ (трохи менший — чистіше читається у вінку) -->
  <g transform="translate(100 100) scale(0.9) translate(-100 -100)">
    <path d="M100,124 Q100,104 114,104 Q128,104 128,124 Z" fill="#ffffff" stroke="#5b6670" stroke-width="2" stroke-linejoin="round"/>
    <circle cx="114" cy="85" r="7.5" fill="#ffffff" stroke="#5b6670" stroke-width="2"/>
    <path d="M72,126 Q72,102 90,102 Q108,102 108,126 Z" fill="#ffffff" stroke="#5b6670" stroke-width="2.2" stroke-linejoin="round"/>
    <circle cx="90" cy="86" r="9" fill="#ffffff" stroke="#5b6670" stroke-width="2.2"/>
    <path d="M76,66 V78 M70,72 H82" fill="none" stroke="#5b6670" stroke-width="2.8" stroke-linecap="round"/>
  </g>
</svg>