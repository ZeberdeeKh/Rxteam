<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Генерал-майор диванних військ текстового забезпечення — золота медаль">
  <defs>
    <radialGradient id="goldDisc" cx="50%" cy="38%" r="72%">
      <stop offset="0" stop-color="#fff3c4"/>
      <stop offset="0.5" stop-color="#edc24f"/>
      <stop offset="1" stop-color="#a9760f"/>
    </radialGradient>
    <linearGradient id="goldRay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7d56c"/>
      <stop offset="1" stop-color="#c8911f"/>
    </linearGradient>
    <linearGradient id="goldBevel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff0b0"/>
      <stop offset="1" stop-color="#cf971c"/>
    </linearGradient>
    <radialGradient id="field" cx="50%" cy="40%" r="75%">
      <stop offset="0" stop-color="#3a4b2b"/>
      <stop offset="0.7" stop-color="#212f18"/>
      <stop offset="1" stop-color="#121c0d"/>
    </radialGradient>
    <linearGradient id="ribbon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c8271d"/>
      <stop offset="1" stop-color="#861009"/>
    </linearGradient>
    <linearGradient id="starGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff1ad"/>
      <stop offset="1" stop-color="#e6a91b"/>
    </linearGradient>
    <path id="ray" d="M -4.5,-69 L 4.5,-69 L 0,-94 Z"/>
    <clipPath id="discClip"><circle cx="100" cy="100" r="70"/></clipPath>
  </defs>

  <!-- Стрічка-підвіс зверху -->
  <path d="M91,16 L109,16 L115,46 L85,46 Z" fill="url(#ribbon)"/>
  <line x1="100" y1="18" x2="100" y2="44" stroke="#5e0a05" stroke-width="1"/>
  <circle cx="100" cy="11" r="5.5" fill="none" stroke="url(#goldBevel)" stroke-width="3"/>

  <!-- Сонячне проміння (сяйво медалі) -->
  <g transform="translate(100 100)">
    <use href="#ray" fill="url(#goldRay)" transform="rotate(0)"/>
    <use href="#ray" fill="url(#goldRay)" transform="rotate(22.5)"/>
    <use href="#ray" fill="url(#goldRay)" transform="rotate(45)"/>
    <use href="#ray" fill="url(#goldRay)" transform="rotate(67.5)"/>
    <use href="#ray" fill="url(#goldRay)" transform="rotate(90)"/>
    <use href="#ray" fill="url(#goldRay)" transform="rotate(112.5)"/>
    <use href="#ray" fill="url(#goldRay)" transform="rotate(135)"/>
    <use href="#ray" fill="url(#goldRay)" transform="rotate(157.5)"/>
    <use href="#ray" fill="url(#goldRay)" transform="rotate(180)"/>
    <use href="#ray" fill="url(#goldRay)" transform="rotate(202.5)"/>
    <use href="#ray" fill="url(#goldRay)" transform="rotate(225)"/>
    <use href="#ray" fill="url(#goldRay)" transform="rotate(247.5)"/>
    <use href="#ray" fill="url(#goldRay)" transform="rotate(270)"/>
    <use href="#ray" fill="url(#goldRay)" transform="rotate(292.5)"/>
    <use href="#ray" fill="url(#goldRay)" transform="rotate(315)"/>
    <use href="#ray" fill="url(#goldRay)" transform="rotate(337.5)"/>
  </g>

  <!-- Основний золотий диск -->
  <circle cx="100" cy="100" r="70" fill="url(#goldDisc)" stroke="#7a5410" stroke-width="2"/>
  <!-- Перлинний кант -->
  <circle cx="100" cy="100" r="62" fill="none" stroke="#7a5410" stroke-width="4.5" stroke-dasharray="1.4 5.2" stroke-linecap="round"/>
  <circle cx="100" cy="100" r="62" fill="none" stroke="#ffe9a3" stroke-width="1.4" stroke-dasharray="1.4 5.2" stroke-linecap="round"/>
  <!-- Рельєфне внутрішнє кільце -->
  <circle cx="100" cy="100" r="56" fill="url(#goldBevel)" stroke="#7a5410" stroke-width="1.5"/>
  <!-- Темне внутрішнє поле (армійський оливковий) -->
  <circle cx="100" cy="100" r="48" fill="url(#field)" stroke="#7a5410" stroke-width="1.2"/>

  <!-- Верхній відблиск на диску -->
  <ellipse cx="100" cy="58" rx="46" ry="22" fill="#ffffff" opacity="0.16" clip-path="url(#discClip)"/>

  <!-- Лавровий вінок навколо чат-іконки -->
  <g fill="#f0c24a" stroke="#9c6b0a" stroke-width="0.7">
    <path d="M100,142 C88,141 80,130 78,110" fill="none" stroke="#cf971c" stroke-width="1.6"/>
    <ellipse cx="84" cy="135" rx="2.7" ry="6.2" transform="rotate(-38 84 135)"/>
    <ellipse cx="80" cy="127" rx="2.7" ry="6.2" transform="rotate(-55 80 127)"/>
    <ellipse cx="78" cy="119" rx="2.7" ry="6.2" transform="rotate(-72 78 119)"/>
    <ellipse cx="78" cy="111" rx="2.7" ry="6.2" transform="rotate(-86 78 111)"/>
    <path d="M100,142 C112,141 120,130 122,110" fill="none" stroke="#cf971c" stroke-width="1.6"/>
    <ellipse cx="116" cy="135" rx="2.7" ry="6.2" transform="rotate(38 116 135)"/>
    <ellipse cx="120" cy="127" rx="2.7" ry="6.2" transform="rotate(55 120 127)"/>
    <ellipse cx="122" cy="119" rx="2.7" ry="6.2" transform="rotate(72 122 119)"/>
    <ellipse cx="122" cy="111" rx="2.7" ry="6.2" transform="rotate(86 122 111)"/>
    <!-- Вузол, де сходяться гілки вінка -->
    <ellipse cx="100" cy="143" rx="4.2" ry="3.2" fill="url(#goldBevel)" stroke="#9c6b0a" stroke-width="0.9"/>
    <path d="M97,145 C95,149 93,150 92,148" fill="none" stroke="#cf971c" stroke-width="1.4"/>
    <path d="M103,145 C105,149 107,150 108,148" fill="none" stroke="#cf971c" stroke-width="1.4"/>
  </g>

  <!-- Іконка чату (бульбашка) із генеральською зіркою всередині -->
  <path d="M86,100 L74,118 L102,100 Z" fill="#f4ecd6" stroke="url(#goldBevel)" stroke-width="2.2" stroke-linejoin="round"/>
  <rect x="64" y="62" width="72" height="40" rx="13" fill="#f4ecd6" stroke="url(#goldBevel)" stroke-width="2.6"/>
  <path d="M100,66 L104.11,78.34 L117.12,78.44 L106.66,86.16 L110.58,98.56 L100,91 L89.42,98.56 L93.34,86.16 L82.88,78.44 L95.89,78.34 Z"
        fill="url(#starGrad)" stroke="#9c6b0a" stroke-width="1.2" stroke-linejoin="round"/>

  <!-- Нижня стрічка-плашка з девізом -->
  <path d="M56,156 L40,150 L43,170 L57,171 Z" fill="#7d130d"/>
  <path d="M144,156 L160,150 L157,170 L143,171 Z" fill="#7d130d"/>
  <rect x="53" y="152" width="94" height="21" rx="3" fill="url(#ribbon)" stroke="url(#goldBevel)" stroke-width="1.5"/>
  <text x="100" y="167" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="13" letter-spacing="2" fill="#ffe27a">ФЛУД</text>
</svg>
